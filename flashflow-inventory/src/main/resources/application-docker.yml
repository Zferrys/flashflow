spring:
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
        namespace: ${NACOS_NAMESPACE:dev}
logging:
  level:
    com.flashflow: INFO

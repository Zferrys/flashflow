# Payment 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/flashflow_payment?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD}

  data:
    redis:
      host: 127.0.0.1
      port: 6379

spring.cloud.nacos.discovery:
  server-addr: 127.0.0.1:8848
  namespace: dev

# 支付宝沙箱配置（为空时使用模拟支付）
alipay:
  app-id:
  private-key:
  public-key:
  notify-url: http://your-server:8120/api/flashflow/payment/notify
  gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do

logging:
  level:
    com.flashflow: DEBUG

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/flashflow_promotion?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
        namespace: ${NACOS_NAMESPACE:dev}
order:
  service:
    url: http://order:5050/api/flashflow/order
logging:
  level:
    com.flashflow: INFO

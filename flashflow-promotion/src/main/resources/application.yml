server:
  port: 8100
  shutdown: graceful

spring:
  application:
    name: flashflow-promotion
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/flashflow_promotion?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 3000
      filter:
        stat:
          log-slow-sql: true
          slow-sql-millis: 2000

  data:
    redis:
      host: 127.0.0.1
      port: 6379

  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000

  lifecycle:
    timeout-per-shutdown-phase: 20s

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

spring.cloud.nacos.discovery:
  server-addr: 127.0.0.1:8848
  namespace: dev

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    path: logs/${spring.application.name}
  level:
    com.flashflow: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

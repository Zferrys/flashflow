# Promotion 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/flashflow_promotion?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD}

  data:
    redis:
      host: 127.0.0.1
      port: 6379

spring.cloud.nacos.discovery:
  server-addr: 127.0.0.1:8848
  namespace: dev

logging:
  level:
    com.flashflow: DEBUG

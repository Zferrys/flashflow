server:
  port: 8090
  shutdown: graceful

spring:
  application:
    name: flashflow-auth
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/flashflow_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
      filter:
        stat:
          log-slow-sql: true
          slow-sql-millis: 2000

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      timeout: 3000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  lifecycle:
    timeout-per-shutdown-phase: 20s

# Nacos 服务发现
spring.cloud.nacos.discovery:
  server-addr: 127.0.0.1:8848
  namespace: dev

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# 日志
logging:
  file:
    path: logs/${spring.application.name}
  level:
    com.flashflow: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# 文件上传
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 20MB

# Docker 环境通用配置
# 所有中间件通过 Docker 服务名访问（非 localhost）
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/flashflow_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
        namespace: ${NACOS_NAMESPACE:dev}
# JWT 配置（必须与 Gateway 完全一致，生产环境通过环境变量覆盖）
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRE:604800000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRE:2592000000}
logging:
  level:
    com.flashflow: INFO

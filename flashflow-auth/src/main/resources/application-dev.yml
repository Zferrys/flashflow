# Auth 模块开发环境配置
# 覆盖 application.yml 中的同名配置

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/flashflow_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD}

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:

  # QQ 邮箱 SMTP 配置（授权码通过环境变量 SMTP_PASSWORD 传入）
  mail:
    host: smtp.qq.com
    port: 587
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

spring.cloud.nacos.discovery:
  server-addr: 127.0.0.1:8848
  namespace: dev
  ip: 127.0.0.1

# JWT 配置
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000     # 30分钟（生产应≤15分钟）
  refresh-token-expiration: 604800000  # 7天

logging:
  level:
    com.flashflow: DEBUG
    org.springframework.security: DEBUG
